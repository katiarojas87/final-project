<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room Labeler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --border: #2a2a2f;
    --accent: #c8f04c;
    --accent2: #4cf0b8;
    --text: #e8e8e0;
    --muted: #6b6b72;
    --danger: #f04c4c;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    max-width: 480px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #0e0e10;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #0e0e10; }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: 0.4; pointer-events: none; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    overflow: hidden;
    height: calc(100vh - 65px);
  }

  .image-pane {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    background: #0b0b0d;
    position: relative;
    overflow: hidden;
  }

  .image-counter {
    position: absolute;
    top: 20px;
    left: 24px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .image-nav {
    position: absolute;
    bottom: 24px;
    display: flex;
    gap: 12px;
  }

  .img-container {
    width: 100%;
    max-width: 700px;
    aspect-ratio: 4/3;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }

  .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .img-placeholder svg { opacity: 0.4; }
  .img-error { color: var(--danger); font-size: 0.8rem; text-align: center; padding: 16px; }

  .controls-pane {
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
    gap: 24px;
    background: var(--surface);
  }

  .row-meta {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.7;
    background: var(--bg);
    padding: 12px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    word-break: break-all;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .room-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .room-chip {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .room-chip:hover { border-color: var(--accent); color: var(--accent); }
  .room-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e10;
    font-weight: 500;
  }

  .toggle-row { display: flex; gap: 8px; }

  .toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .toggle-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .toggle-btn.selected-yes  { background: var(--accent);  border-color: var(--accent);  color: #0e0e10; font-weight: 500; }
  .toggle-btn.selected-no   { background: var(--danger);  border-color: var(--danger);  color: #fff;    font-weight: 500; }
  .toggle-btn.selected-new  { background: var(--accent2); border-color: var(--accent2); color: #0e0e10; font-weight: 500; }
  .toggle-btn.selected-used { background: #6b4cf0;        border-color: #6b4cf0;        color: #fff;    font-weight: 500; }

  .action-row { display: flex; gap: 8px; margin-top: auto; flex-wrap: wrap; }

  .status-bar {
    font-size: 0.72rem;
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
    display: none;
  }
  .status-bar.success { background: rgba(200,240,76,0.1); color: var(--accent); display: block; border: 1px solid rgba(200,240,76,0.3); }
  .status-bar.error   { background: rgba(240,76,76,0.1);  color: var(--danger); display: block; border: 1px solid rgba(240,76,76,0.3); }

  #loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 999;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--muted); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .already-labeled-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--accent);
    color: #0e0e10;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Loading sheet data…</div>
</div>

<header>
  <div class="logo">Room Labeler</div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn" id="btnSave">💾 Save Progress</button>
    <a class="btn btn-primary" id="btnDownload" href="/api/download">⬇ Download CSV</a>
  </div>
</header>

<main>
  <div class="image-pane">
    <div class="image-counter" id="imageCounter">— / —</div>
    <div class="img-container" id="imgContainer">
      <div class="img-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>No image loaded</span>
      </div>
    </div>
    <div class="image-nav">
      <button class="btn" id="btnPrev">← Prev</button>
      <button class="btn" id="btnNext">Next →</button>
    </div>
  </div>

  <div class="controls-pane">
    <div class="row-meta" id="rowMeta">No row selected</div>

    <div>
      <div class="section-title">Room Type</div>
      <div class="room-grid" id="roomGrid"></div>
    </div>

    <div>
      <div class="section-title">Luxury</div>
      <div class="toggle-row">
        <button class="toggle-btn" id="luxYes"    onclick="setToggle('luxury','yes')">✓ Yes</button>
        <button class="toggle-btn" id="luxNo"     onclick="setToggle('luxury','no')">✗ No</button>
      </div>
    </div>

    <div>
      <div class="section-title">Brightness</div>
      <div class="toggle-row">
        <button class="toggle-btn" id="brightYes" onclick="setToggle('brightness','yes')">☀ Yes</button>
        <button class="toggle-btn" id="brightNo"  onclick="setToggle('brightness','no')">☁ No</button>
      </div>
    </div>

    <div>
      <div class="section-title">Condition</div>
      <div class="toggle-row">
        <button class="toggle-btn" id="condNew"   onclick="setToggle('condition','new')">✦ New</button>
        <button class="toggle-btn" id="condUsed"  onclick="setToggle('condition','used')">◈ Used</button>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" id="btnSubmit" style="flex:1" onclick="submitLabel()">Submit & Next →</button>
      <button class="btn btn-danger"  id="btnSkip"   onclick="skipRow()">Skip</button>
    </div>

    <div class="status-bar" id="statusBar"></div>
  </div>
</main>

<script>
let allRows        = [];
let fieldnames     = [];
let roomLabels     = [];
let currentIndex   = 0;
let pendingUpdates = [];
let selections     = { roomType: null, luxury: null, brightness: null, condition: null };

async function init() {
  try {
    const res  = await fetch('/api/data');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allRows    = data.rows;
    fieldnames = data.fieldnames;
    roomLabels = data.room_type_labels;

    buildRoomGrid();
    updateProgress();

    currentIndex = data.first_unlabeled !== null ? data.first_unlabeled : 0;
    renderRow(currentIndex);

  } catch(e) {
    document.getElementById('loader').innerHTML =
      `<div style="color:#f04c4c;font-family:DM Mono,monospace;text-align:center;padding:32px">
        ⚠ Failed to load sheet data.<br><br>
        <small style="color:#6b6b72">Make sure the Google Sheet is publicly accessible.<br><br>${e.message}</small>
      </div>`;
    return;
  }
  document.getElementById('loader').style.display = 'none';
}

function buildRoomGrid() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  roomLabels.forEach(label => {
    const chip = document.createElement('button');
    chip.className = 'room-chip';
    chip.textContent = label;
    chip.title = label;
    chip.onclick = () => selectRoom(label, chip);
    grid.appendChild(chip);
  });
}

function selectRoom(label, chipEl) {
  document.querySelectorAll('.room-chip').forEach(c => c.classList.remove('selected'));
  chipEl.classList.add('selected');
  selections.roomType = label;
}

function setToggle(field, value) {
  if (field === 'luxury') {
    selections.luxury = value;
    document.getElementById('luxYes').className = 'toggle-btn' + (value==='yes' ? ' selected-yes' : '');
    document.getElementById('luxNo').className  = 'toggle-btn' + (value==='no'  ? ' selected-no'  : '');
  } else if (field === 'brightness') {
    selections.brightness = value;
    document.getElementById('brightYes').className = 'toggle-btn' + (value==='yes' ? ' selected-yes' : '');
    document.getElementById('brightNo').className  = 'toggle-btn' + (value==='no'  ? ' selected-no'  : '');
  } else if (field === 'condition') {
    selections.condition = value;
    document.getElementById('condNew').className  = 'toggle-btn' + (value==='new'  ? ' selected-new'  : '');
    document.getElementById('condUsed').className = 'toggle-btn' + (value==='used' ? ' selected-used' : '');
  }
}

function renderRow(idx) {
  if (idx < 0 || idx >= allRows.length) return;
  currentIndex = idx;
  const row     = allRows[idx];
  const url     = row['image_url'] || '';
  const labeled = row['RoomType'] && row['RoomType'].trim();

  const container = document.getElementById('imgContainer');
  const badge     = labeled ? '<div class="already-labeled-badge">Labeled</div>' : '';

  if (url) {
    container.innerHTML = `<img src="${url}" alt="room"
      onerror="this.parentElement.innerHTML='<div class=\\'img-error\\'>⚠ Could not load image<br><small>${url}</small></div>'"
    />${badge}`;
  } else {
    container.innerHTML = `<div class='img-placeholder'>
      <svg width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5'>
        <rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/>
      </svg><span>No image URL</span></div>`;
  }

  document.getElementById('imageCounter').textContent = `${idx + 1} / ${allRows.length}`;

  const metaKeys = ['room_type','RoomType','Luxury','Brightness','Condition'];
  document.getElementById('rowMeta').innerHTML =
    metaKeys.filter(k => k in row).map(k => `<b>${k}:</b> ${row[k] || '—'}`).join('<br>');

  clearSelections();

  if (row['RoomType'])   {
    selections.roomType = row['RoomType'];
    document.querySelectorAll('.room-chip').forEach(c => {
      if (c.textContent === row['RoomType']) c.classList.add('selected');
    });
  }
  if (row['Luxury'])     setToggle('luxury',     row['Luxury'].toLowerCase());
  if (row['Brightness']) setToggle('brightness', row['Brightness'].toLowerCase());
  if (row['Condition'])  setToggle('condition',  row['Condition'].toLowerCase());

  hideStatus();
}

function clearSelections() {
  selections = { roomType: null, luxury: null, brightness: null, condition: null };
  document.querySelectorAll('.room-chip').forEach(c => c.classList.remove('selected'));
  ['luxYes','luxNo','brightYes','brightNo','condNew','condUsed'].forEach(id => {
    document.getElementById(id).className = 'toggle-btn';
  });
}

function submitLabel() {
  if (!selections.roomType)   { showStatus('Please select a Room Type.', 'error'); return; }
  if (!selections.luxury)     { showStatus('Please set Luxury.',          'error'); return; }
  if (!selections.brightness) { showStatus('Please set Brightness.',      'error'); return; }
  if (!selections.condition)  { showStatus('Please set Condition.',       'error'); return; }

  allRows[currentIndex]['RoomType']   = selections.roomType;
  allRows[currentIndex]['Luxury']     = selections.luxury;
  allRows[currentIndex]['Brightness'] = selections.brightness;
  allRows[currentIndex]['Condition']  = selections.condition;

  pendingUpdates.push({ row_index: currentIndex, row_data: allRows[currentIndex] });

  updateProgress();
  autoSave();

  const next = findNextUnlabeled(currentIndex + 1);
  if (next !== null) renderRow(next);
  else showStatus('✓ All rows labeled! Click Download CSV.', 'success');
}

function skipRow() {
  const next = findNextUnlabeled(currentIndex + 1);
  if (next !== null) renderRow(next);
  else showStatus('No more unlabeled rows.', 'success');
}

function findNextUnlabeled(startFrom) {
  for (let i = startFrom; i < allRows.length; i++) {
    if (!allRows[i]['RoomType'] || !allRows[i]['RoomType'].trim()) return i;
  }
  for (let i = 0; i < startFrom; i++) {
    if (!allRows[i]['RoomType'] || !allRows[i]['RoomType'].trim()) return i;
  }
  return null;
}

function updateProgress() {
  const labeled = allRows.filter(r => r['RoomType'] && r['RoomType'].trim()).length;
  const total   = allRows.length;
  document.getElementById('progressFill').style.width = (total ? labeled/total*100 : 0) + '%';
  document.getElementById('progressLabel').textContent = `${labeled} / ${total}`;
}

async function autoSave() {
  await fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      rows: allRows,
      fieldnames,
      updates: pendingUpdates
    })
  });
  pendingUpdates = [];
}

document.getElementById('btnSave').addEventListener('click', async () => {
  document.getElementById('btnSave').disabled = true;
  try {
    const res  = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows: allRows, fieldnames, updates: pendingUpdates })
    });
    const data = await res.json();
    if (data.ok) {
      pendingUpdates = [];
      showStatus(`✓ Saved ${data.saved} rows, updated ${data.sheet_updated} in sheet.`, 'success');
    } else {
      showStatus('Save failed: ' + data.error, 'error');
    }
  } finally {
    document.getElementById('btnSave').disabled = false;
  }
});

document.getElementById('btnPrev').addEventListener('click', () => {
  if (currentIndex > 0) renderRow(currentIndex - 1);
});
document.getElementById('btnNext').addEventListener('click', () => {
  if (currentIndex < allRows.length - 1) renderRow(currentIndex + 1);
});

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') submitLabel();
  if (e.key === 'ArrowLeft') renderRow(Math.max(0, currentIndex - 1));
  if (e.key === 's') document.getElementById('btnSave').click();
});

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + type;
}
function hideStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

init();
</script>
</body>
</html>
